server.port=8086
spring.application.name=msvc-event-dispatcher

# DATABASE CONFIGURATION (PRUEBA LOCAL DIRECTA)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5444/pay_bridge_db
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LOGGING DEBUG (PARA DETECTAR ERRORES DE CONEXIÓN)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.datasource=DEBUG

# --- OTRAS CONFIGURACIONES (COMENTADAS) ---
 springdoc.api-docs.path=/v3/api-docs
 springdoc.swagger-ui.path=/swagger-ui.html
 eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Messaging SDK Generic Configuration
messaging.sdk.rabbit.queue-name=notification.queue
messaging.sdk.rabbit.exchange-name=notification.exchange
messaging.sdk.rabbit.routing-key=notification.payment.received
messaging.sdk.rabbit.dead-letter-exchange=notification.exchange.dlx
messaging.sdk.rabbit.dead-letter-routing-key=notification.dead.letter

# ==========================================
# SPRING ACTUATOR & HEALTH CHECKS
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true